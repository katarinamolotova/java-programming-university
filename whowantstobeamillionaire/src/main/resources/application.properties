spring.application.name=whowantstobeamillionaire
spring.datasource.url=jdbc:sqlite:/Users/kamolotova/Desktop/java/whowantstobeamillionaire/src/main/resources/questions.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.hikari.maximum-pool-size=1

ai.question-generation.base-url=https://gigachat.devices.sberbank.ru/api/v1
ai.question-generation.auth-url=https://ngw.devices.sberbank.ru:9443/api/v2/oauth
ai.question-generation.model=GigaChat
ai.question-generation.authorization-key=${GIGACHAT_AUTH_KEY}
ai.question-generation.scope=GIGACHAT_API_PERS
ai.question-generation.connect-timeout-ms=5000
ai.question-generation.read-timeout-ms=20000
ai.question-generation.temperature=0.7
ai.question-generation.max-output-tokens=256

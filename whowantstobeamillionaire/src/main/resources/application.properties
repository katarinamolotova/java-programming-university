spring.application.name=whowantstobeamillionaire
spring.datasource.url=jdbc:sqlite::resource:questions.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.hikari.maximum-pool-size=1

ai.question-generation.base-url=https://api.deepseek.com
ai.question-generation.model=deepseek-v4-flash
ai.question-generation.api-key=${DEEPSEEK_API_KEY:}
ai.question-generation.connect-timeout-ms=5000
ai.question-generation.read-timeout-ms=20000
ai.question-generation.temperature=0.7
ai.question-generation.max-output-tokens=256
